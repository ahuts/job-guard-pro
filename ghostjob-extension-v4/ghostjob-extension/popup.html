<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GhostJob</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.9;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .status-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .scan-btn {
      width: 100%;
      padding: 14px 24px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .scan-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .scan-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .features {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .features-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .feature-icon {
      font-size: 16px;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .score-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .score-info {
      flex: 1;
    }

    .score-label {
      font-size: 14px;
      font-weight: 600;
    }

    .score-value {
      font-size: 12px;
      opacity: 0.8;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">👻</div>
    <div class="title">GhostJob</div>
    <div class="subtitle">Detect Ghost Jobs on LinkedIn</div>
  </div>

  <div class="status-card">
    <div class="status-title">
      <div class="status-indicator"></div>
      Extension Active
    </div>
    <div class="status-text" id="page-status">
      Navigate to a LinkedIn job posting to scan it for ghost job signals.
    </div>
  </div>

  <button class="scan-btn" id="scan-btn" disabled>
    Scan Current Job
  </button>

  <div class="result-card" id="result-card">
    <div class="score-display">
      <div class="score-circle" id="score-circle">--</div>
      <div class="score-info">
        <div class="score-label" id="score-label">Ready to scan</div>
        <div class="score-value" id="score-value"></div>
      </div>
    </div>
  </div>

  <div class="error-message" id="error-message"></div>

  <div class="features">
    <div class="features-title">How it works</div>
    <div class="feature-item">
      <span class="feature-icon">🔍</span>
      <span>Scans job posting for ghost signals</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">📊</span>
      <span>Generates 0-100 Trust Score</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">⚡</span>
      <span>Works instantly on LinkedIn</span>
    </div>
  </div>

  <div class="footer">
    GhostJob Extension v1.0.4
  </div>

  <script src="popup.js"></script>
</body>
</html>
